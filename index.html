    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Cuándo puedo construir mi casa?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Tú decides cuándo. No hay presión para iniciar. Nuestras normas de construcción protegen a toda la comunidad —ruido, densidad e integración con la selva—, así que el conjunto se mantiene siempre. Una vez que inicias obra, el plazo máximo para terminar es de 2 años."
          }
        },
        {
          "@type": "Question",
          "name": "¿Hay cuota de mantenimiento?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, aproximadamente 5 pesos por m² al mes. Además, el fideicomiso incluye una reserva de la asociación de colonos que garantiza el mantenimiento correcto de las amenidades y áreas comunes a largo plazo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuándo se entregan los lotes y amenidades?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Suspiro y sus amenidades se entregan en 2029. Sin embargo, los residentes de Selvadentro disfrutan el proyecto desde el momento de su compra: acceso a los cenotes, áreas comunes y experiencias."
          }
        },
        {
          "@type": "Question",
          "name": "¿Puedo rentar mi propiedad?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Trabajamos con los mejores property managers para asegurar la mejor ocupación y el cuidado de tu residencia. Selvadentro ofrece lo que el viajero de Tulum busca —experiencias, lujo descalzo, desconectar para conectar—, lo que se traduce en mejores tarifas y ocupación."
          }
        },
        {
          "@type": "Question",
          "name": "¿Qué incluye la infraestructura?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Energía sustentable, red de agua subterránea, acceso controlado, seguridad 24/7, internet en áreas comunes, iluminación y paisajismo integrado, además de la Avenida Selvadentro y la calle interior de Suspiro."
          }
        }
      ]
    }
    </script>
