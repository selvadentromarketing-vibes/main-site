<?xml version="1.0" encoding="UTF-8"?>
<!-- AMA Estudio partner logo. Reproduced as SVG from the reference Hoshi
     shared in WhatsApp ("ESTUDIO" light, "AMA" extra bold). Both words flow
     in a single text element with tspans so the gap between them holds at
     any font metrics — a hardcoded x-offset previously caused the words to
     collide. Colored via currentColor to match the Maat Handasa treatment. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 90" width="560" height="90" role="img" aria-label="Estudio AMA">
  <style>
    text { font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif; }
  </style>
  <text x="0" y="66" font-size="62" fill="currentColor">
    <tspan font-weight="300" letter-spacing="6">ESTUDIO</tspan>
    <tspan font-weight="800" letter-spacing="2" dx="24">AMA</tspan>
  </text>
</svg>
